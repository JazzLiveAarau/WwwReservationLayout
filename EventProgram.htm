<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Aufladen von Bildern für das JAZZ live AARAU Gästebuch">
    <meta name="author" content="Gunnar Liden">  
    <meta http-equiv="cache-control" content="no-cache, must-revalidate, post-check=0, pre-check=0" />
    <meta http-equiv="cache-control" content="max-age=0" />
    <meta http-equiv="expires" content="0" />
    <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
    <meta http-equiv="pragma" content="no-cache" />	

    <!-- Styles for the application  -->
    <link rel="stylesheet" href="Styles/EventProgram.css">

    <!--  Main function for the application -->
    <script type="text/javascript" src="Scripts/EventProgram.js"></script>

    <!--  Class creating an EventProgramXml XML file from a season XML file  -->
    <script type="text/javascript" src="Scripts/SeasonToEventProgramXml.js"></script>

    <!--  Class creating the new XML event files -->
    <script type="text/javascript" src="Scripts/CreateXmlEventFiles.js"></script>

    <!--  Class creating an XML object for an event -->
    <script type="text/javascript" src="Scripts/ReservationEventXml.js"></script>

    <!--  Class for the handling of an event program. The event data is defined in the file EventProgram.xml  -->
    <script type="text/javascript" src="Scripts/EventProgramXml.js"></script>

    <!--  Class handling the storage of new season data in the computer  -->
    <script type="text/javascript" src="Scripts/NewSeasonStorage.js"></script>

     <!-- Standard controls -->
     <script type="text/javascript" src="https://jazzliveaarau.ch/JazzScripts/Controls_20250406.js"></script>

    <!--  Library with XML classes -->
    <script type="text/javascript" src="https://jazzliveaarau.ch/JazzScripts/Xml_20251129.js"></script> 

    <!--  Library with Utility classes -->
    <script type="text/javascript" src="https://jazzliveaarau.ch/JazzScripts/Utils_20250419.js"></script>

    <!--  jQuery library -->
    <script src="jQuery/jquery-3.6.0.js"></script>

    <title>Event Program</title>

</head>

<body onload= "initEventProgram()">

    <div id= 'id_div_event_program_page' class= 'cl_div_event_program_page'>

        <div id= 'id_div_event_program_text_logo' class= 'cl_div_event_program_text_logo'>

            <div class="cl_event_program_title">JAZZ <i>live</i> AARAU <br>Event Programm</div> 
            <div class="cl_div_event_program_help_buttons"> 
                <div id="id_div_help_button" class="cl_div_event_program_help_button">Hilfe</div>
                <div id="id_div_it_info_button" class="cl_div_event_program_help_button">IT Info</div>
            </div>

        </div> <!-- id_div_event_program_text_logo -->

        <div class="cl_event_step_title" >1. Server Ordner</div>

        <div class="cl_div_event_program_storage_dir">
            <div id="id_div_event_program_main_dir" class="cl_div_event_program_main_dir" >URL main dir</div>
            <div id="id_div_event_program_result_dir" class="cl_div_event_program_result_dir" >URL result dir</div>
        </div> <!-- cl_div_event_program_storage_dir -->

        <div class="cl_event_step_title" >Start XML Datei</div>

        <div class="cl_div_event_program_upload_xml_container">
            <div id="id_div_event_program_upload_xml_textbox" class="cl_div_event_program_upload_xml_textbox" >div text</div>
            <div id="id_div_event_program_upload_xml_button" class="cl_div_event_program_upload_xml_button" >2. upload</div>
            <div id="id_div_event_program_download_xml_button" class="cl_div_event_program_download_xml_button" >download</div>

        </div> <!-- cl_div_event_program_upload_xml_container -->

        <div class="cl_event_step_title" >Event Programm</div>

        <div id="id_div_event_program_select_container" class="cl_div_event_program_select_container">
            <div id="id_div_event_program_select_dropdown" class="cl_div_event_program_select_dropdown">Events dropdown</div>
            <div class="cl_div_event_program_select_buttons"> 
                <div id="id_div_select_edit_button" class="cl_div_event_program_select_button">Event bearbeiten</div>
                <div id="id_div_select_delete_button" class="cl_div_event_program_select_button">Event löschen</div>
                
            </div> <!-- cl_div_event_program_select_buttons -->

        </div> <!-- cl_div_event_program_select_container -->

    </div>

</body>
</html>
